{% extends 'base.html' %}

{% block content %}

<h2>Delete Product</h2>

<p>
    Are you sure you want to delete
    "{{ product.name }}"?
</p>

<form method="POST">

    {% csrf_token %}

    <button type="submit">
        Delete
    </button>

</form>

<p>
    <a href="/products/{{ product.id }}/">
        Cancel
    </a>
</p>

{% endblock %}
