{% extends 'base.html' %}

{% block content %}

<h2>{{ product.name }}</h2>

<p>
    Price: &#8377;{{ product.price }}
</p>

<p>
    Stock: {{ product.stock }}
</p>

<p>
    Description: {{ product.description }}
</p>

<p>
    <a href="/products/{{ product.id }}/edit/">
        Edit Product
    </a>
</p>

<p>
    <a href="/products/{{ product.id }}/delete/">
        Delete Product
    </a>

{% endblock %}
